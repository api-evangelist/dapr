description: >-
  Dapr (Distributed Application Runtime) is a portable, event-driven runtime
  that makes it easy for developers to build resilient, stateless, and stateful
  applications that run on the cloud and edge. It provides building block APIs
  for state management, pub/sub messaging, service invocation, bindings,
  actors, workflows, secrets, configuration, distributed locks, cryptography,
  jobs scheduling, health checks, and metadata.

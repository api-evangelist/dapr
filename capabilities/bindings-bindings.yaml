naftiko: 1.0.0-alpha2
info:
  label: Dapr Bindings API — Bindings
  description: 'Dapr Bindings API — Bindings. 1 operations. Lead operation: Dapr Invoke Output Binding. Self-contained Naftiko
    capability covering one Dapr business surface.'
  tags:
  - Dapr
  - Bindings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DAPR_API_KEY: DAPR_API_KEY
capability:
  consumes:
  - type: http
    namespace: bindings-bindings
    baseUri: http://localhost:3500
    description: Dapr Bindings API — Bindings business capability. Self-contained, no shared references.
    resources:
    - name: v1.0-bindings-name
      path: /v1.0/bindings/{name}
      operations:
      - name: invokeoutputbinding
        method: POST
        description: Dapr Invoke Output Binding
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the output binding to invoke.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: bindings-bindings-rest
    port: 8080
    description: REST adapter for Dapr Bindings API — Bindings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1-0/bindings/{name}
      name: v1-0-bindings-name
      description: REST surface for v1.0-bindings-name.
      operations:
      - method: POST
        name: invokeoutputbinding
        description: Dapr Invoke Output Binding
        call: bindings-bindings.invokeoutputbinding
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bindings-bindings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dapr Bindings API — Bindings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: dapr-invoke-output-binding
      description: Dapr Invoke Output Binding
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bindings-bindings.invokeoutputbinding
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

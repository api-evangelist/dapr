naftiko: 1.0.0-alpha2
info:
  label: Dapr Jobs API — Jobs
  description: 'Dapr Jobs API — Jobs. 3 operations. Lead operation: Dapr Schedule Job. Self-contained Naftiko capability covering
    one Dapr business surface.'
  tags:
  - Dapr
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DAPR_API_KEY: DAPR_API_KEY
capability:
  consumes:
  - type: http
    namespace: jobs-jobs
    baseUri: http://localhost:3500
    description: Dapr Jobs API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: v1.0-alpha1-jobs-name
      path: /v1.0-alpha1/jobs/{name}
      operations:
      - name: schedulejob
        method: POST
        description: Dapr Schedule Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the job.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getjob
        method: GET
        description: Dapr Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the job to retrieve.
          required: true
      - name: deletejob
        method: DELETE
        description: Dapr Delete Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the job to delete.
          required: true
  exposes:
  - type: rest
    namespace: jobs-jobs-rest
    port: 8080
    description: REST adapter for Dapr Jobs API — Jobs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1-0-alpha1/jobs/{name}
      name: v1-0-alpha1-jobs-name
      description: REST surface for v1.0-alpha1-jobs-name.
      operations:
      - method: POST
        name: schedulejob
        description: Dapr Schedule Job
        call: jobs-jobs.schedulejob
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getjob
        description: Dapr Get Job
        call: jobs-jobs.getjob
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletejob
        description: Dapr Delete Job
        call: jobs-jobs.deletejob
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: jobs-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dapr Jobs API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: dapr-schedule-job
      description: Dapr Schedule Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: jobs-jobs.schedulejob
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dapr-get-job
      description: Dapr Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: jobs-jobs.getjob
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: dapr-delete-job
      description: Dapr Delete Job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: jobs-jobs.deletejob
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.

provider: Dapr
providerId: dapr
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Distributed Systems
  - Microservices
  - Open Source
  - Pub/Sub
  - State Management
  - Workflows
description: Dapr is an open-source CNCF distributed application runtime released under the Apache 2.0
  license. The Dapr project itself does not sell a commercial offering — there is no public pricing,
  tiering, or per-call billing. Cost to operators is the underlying infrastructure (Kubernetes nodes,
  state stores, message brokers) that hosts the Dapr sidecars. Several third-party vendors (e.g.
  Diagrid Catalyst, Microsoft Azure Container Apps Dapr extension) offer managed or commercial
  distributions on separate price sheets, but those are out of scope for this artifact.
sources:
  - https://dapr.io
  - https://github.com/dapr/dapr/blob/master/LICENSE
notes: No public pricing exists for upstream Dapr. Plans are not applicable. Reconciled flag remains
  false to indicate there is nothing commercial to reconcile against.
plans:
  - id: dapr-open-source
    name: Open Source
    type: freemium
    description: Apache 2.0 licensed open-source distribution. Free to download, run, and modify.
      Operators bear only the underlying infrastructure cost.
